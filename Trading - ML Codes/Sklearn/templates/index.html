<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Prediction</title>
</head>
<body>
    <h1>Stock Price Prediction</h1>
    <form method="post">
        <label for="stock">Select a Stock:</label>
        <select name="stock" id="stock">
            {% for stock in stocks %}
                <option value="{{ stock }}" {% if selected_stock == stock %}selected{% endif %}>{{ stock }}</option>
            {% endfor %}
        </select>
        <button type="submit">Predict</button>
    </form>
    
    {% if predictions %}
        <h2>Predicted Prices for Next 10 Days</h2>
        <ul>
            {% for price in predictions %}
                <li>{{ price }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
