apiVersion: apps/v1
kind: Deployment
metadata:
  name: cu-deployment
  labels:
    app: openran-cu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openran-cu
  template:
    metadata:
      labels:
        app: openran-cu
    spec:
      containers:
      - name: cu-control-plane
        image: openran/cu-cp:latest
        ports:
        - containerPort: 8080
      - name: cu-user-plane
        image: openran/cu-up:latest
        ports:
        - containerPort: 2152
      nodeSelector:
        openran-role: cu
