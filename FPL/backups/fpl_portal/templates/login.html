<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPL Dashboard</title>

  <!-- DataTables & Bootstrap -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css">

  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif; background:#f4f6f9; }
    * { box-sizing:border-box; }

    .container { display:flex; width:100vw; height:100vh; overflow:hidden; margin:0; padding:0; background:#fff; }

    /* Panels */
    #my-team, #stats-section, #suggestions { height:100%; overflow-y:auto; padding:10px; }
    #my-team{ flex:0 0 calc(20% - 4px); border-right:2px solid #007bff; background:#fff; }
    #stats-section{ flex:0 0 calc(60% - 4px); border-right:2px solid #007bff; background:#fff; }
    #suggestions{ flex:1; background:#fff; }

    /* Headings */
    #my-team h3, #suggestions h3{ color:#007bff; border-bottom:2px solid #007bff; margin:10px 0; padding-bottom:4px; font-size:1.1em; }
    #stats-section h2{ background:#007bff; color:#fff; text-align:center; margin:0; padding:10px 0; font-size:1.2em; }

    /* Table */
    #table-container{ flex:1; overflow-y:auto; overflow-x:hidden; }
    table.dataTable{ width:100%!important; table-layout:fixed; border-collapse:collapse; }
    table.dataTable thead th{ background:#f1f3f6; text-align:center; white-space:nowrap; }

    /* Highlighting */
    .highlighted{ background-color:#d4edda!important; border-left:5px solid #007bff; }
    .owned-name{ color:#007bff!important; font-weight:800; }

    /* Player cards (left) */
    .player-card{ display:flex; align-items:center; gap:10px; background:#f8f9fa; border-radius:10px; margin-bottom:6px; padding:8px; transition:background .3s; }
    .player-card:hover{ background:#e9f5ff; }
    .player-card img{ width:40px; height:40px; border-radius:50%; border:1px solid #ccc; }

    /* Suggestions (right) */
    .suggestion-card{ background:#f8f9fa; border-radius:10px; padding:8px; margin-bottom:8px; transition:.3s; }
    .suggestion-card:hover{ background:#e9f5ff; }
    .suggestion-card strong{ color:#007bff; }

    /* Resizers */
    .resizer{ width:4px; background:#007bff; cursor:col-resize; transition:background .2s; }
    .resizer:hover{ background:#0056b3; }

    @media (max-width:900px){
      .container{ flex-direction:column; }
      .resizer{ height:4px; width:100%; cursor:row-resize; }
    }
  </style>
</head>

<body>
  <div class="container" id="mainContainer">
    <!-- LEFT PANEL -->
    <div id="my-team">
      <h3>My FPL Team</h3>
      <div id="team-list"><p>Loading your team...</p></div>
    </div>
    <div class="resizer" id="resizer1"></div>

    <!-- MIDDLE PANEL -->
    <div id="stats-section">
      <h2>FPL Top Players (Dynamic Table)</h2>
      <div id="table-container">
        <table id="fplTable" class="display table table-striped">
          <thead><tr></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <div class="resizer" id="resizer2"></div>

    <!-- RIGHT PANEL -->
    <div id="suggestions">
      <h3>Player Suggestions</h3>
      <div id="suggestion-list"><p>Loading suggestions...</p></div>
    </div>
  </div>

  <!-- JS LIBS -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>

  <script>
    /* ==== Resizers (keep if you still want dragging) ==== */
    function setupAllResizers(){
      const container=document.getElementById('mainContainer');
      const left=document.getElementById('my-team');
      const middle=document.getElementById('stats-section');
      const right=document.getElementById('suggestions');
      const r1=document.getElementById('resizer1');
      const r2=document.getElementById('resizer2');
      let active=null;

      const down=(e,who)=>{ e.preventDefault(); active=who; document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; };
      r1.addEventListener('mousedown',e=>down(e,r1));
      r2.addEventListener('mousedown',e=>down(e,r2));

      window.addEventListener('mousemove',e=>{
        if(!active) return;
        const rect=container.getBoundingClientRect();

        if(active===r1){
          const leftW=e.clientX-rect.left;
          const leftPct=(leftW/rect.width)*100;
          const rightPct=parseFloat(right.style.flexBasis)||20;
          const midPct=100-leftPct-rightPct;
          if(leftPct>10&&midPct>10){ left.style.flex=`0 0 ${leftPct}%`; middle.style.flex=`0 0 ${midPct}%`; }
        }else if(active===r2){
          const rightW=rect.right-e.clientX;
          const rightPct=(rightW/rect.width)*100;
          const leftPct=parseFloat(left.style.flexBasis)||20;
          const midPct=100-leftPct-rightPct;
          if(rightPct>10&&midPct>10){ right.style.flex=`0 0 ${rightPct}%`; middle.style.flex=`0 0 ${midPct}%`; }
        }
      });

      window.addEventListener('mouseup',()=>{ active=null; document.body.style.cursor=''; document.body.style.userSelect=''; });
    }

    window.onload=function(){ setupAllResizers(); loadData(); };

    /* ==== String normalization for robust matching ==== */
    function normalizeName(s){
      if(!s) return '';
      return s
        .toString()
        .normalize('NFD')
        .replace(/\p{Diacritic}/gu,'')
        .replace(/[^a-z0-9 ]+/gi,'')
        .trim()
        .toLowerCase();
    }

    async function loadData(){
      try{
        /* --- LEFT: My Team --- */
        const teamRes=await fetch('/api/myteam');
        const team=await teamRes.json();

        const teamDiv=document.getElementById('team-list');
        teamDiv.innerHTML='';

        const starters=team.filter(p=>p.starting);
        const bench=team.filter(p=>!p.starting);

        const startersHeader=document.createElement('h3'); startersHeader.textContent='Starting XI'; teamDiv.appendChild(startersHeader);
        starters.forEach(p=>{
          const d=document.createElement('div');
          d.className='player-card';
          d.innerHTML=`
            <img src="${p.photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
            <div style="display:flex;flex-direction:column;">
              <span>${p.web_name} ${p.is_captain?'🧢':p.is_vice_captain?'💫':''}</span>
              <small>${p.team} | ${p.position}</small>
              <small style="color:#007bff;">Last GW: <strong>${p.last_gw_points} pts</strong></small>
            </div>`;
          teamDiv.appendChild(d);
        });

        const benchHeader=document.createElement('h3'); benchHeader.textContent='Bench'; teamDiv.appendChild(benchHeader);
        bench.forEach(p=>{
          const d=document.createElement('div');
          d.className='player-card';
          d.style.opacity='0.75';
          d.innerHTML=`
            <img src="${p.photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
            <div style="display:flex;flex-direction:column;">
              <span>${p.web_name}</span>
              <small>${p.team} | ${p.position}</small>
              <small style="color:#007bff;">Last GW: <strong>${p.last_gw_points} pts</strong></small>
            </div>`;
          teamDiv.appendChild(d);
        });

        /* Build a robust Set of owned names (web_name + full name) */
        const ownedNames=new Set();
        team.forEach(p=>{
          if(p.web_name) ownedNames.add(normalizeName(p.web_name));
          if(p.name)     ownedNames.add(normalizeName(p.name));
        });

        /* --- MIDDLE: Table Data --- */
        const dataRes=await fetch('/api/data');
        const fplData=await dataRes.json();

        if(!Array.isArray(fplData)||fplData.length===0){
          $('#fplTable').html('<p>No data available</p>');
          return;
        }

        /* Dynamic columns + auto-detect player column */
        const columns=Object.keys(fplData[0]).map(k=>({data:k, title:k.replace(/_/g,' ')}));
        const headerRow=$('#fplTable thead tr'); headerRow.empty();
        columns.forEach(c=>headerRow.append(`<th>${c.title}</th>`));

        // Guess the player key from data keys
        let playerKey = (['Player','player','web_name','player_name','Name','name']).find(k=>k in fplData[0]);
        if(!playerKey) playerKey = Object.keys(fplData[0]).find(k=>/player|name/i.test(k)) || Object.keys(fplData[0])[0];

        // Find its column index to color the name cell too
        const playerColIndex = columns.findIndex(c=>c.data===playerKey);

        // Safety: destroy if already initialized
        if($.fn.dataTable.isDataTable('#fplTable')) $('#fplTable').DataTable().destroy();

        const table=$('#fplTable').DataTable({
          data:fplData,
          columns:columns,
          pageLength:15,
          responsive:true,
          autoWidth:false,
          dom:'Bfrtip',
          buttons:['copy','csv','excel','print'],

          /* 💡 Robust per-draw row styling (works on sort/filter/paginate) */
          rowCallback:function(row, data){
            const rawName = data[playerKey];
            const cellVal = normalizeName(rawName);

            let isOwned = ownedNames.has(cellVal);

            // Fallback: allow partial match if exact not found (e.g., "M. Salah" vs "Salah")
            if(!isOwned){
              for(const owned of ownedNames){
                if(owned && cellVal && (cellVal.includes(owned) || owned.includes(cellVal))){
                  isOwned = true; break;
                }
              }
            }

            if(isOwned){
              row.classList.add('highlighted');
              if(playerColIndex>=0){
                const nameCell = row.children[playerColIndex];
                if(nameCell) nameCell.classList.add('owned-name');
              }
            }
          }
        });

        /* --- RIGHT: Suggestions --- */
        const suggRes=await fetch('/api/suggestions');
        const suggestions=await suggRes.json();
        const suggDiv=document.getElementById('suggestion-list');
        suggDiv.innerHTML='';
        if(Array.isArray(suggestions)){
          suggestions.forEach(s=>{
            const d=document.createElement('div');
            d.className='suggestion-card';
            d.innerHTML=`<strong>${s.name}</strong><br>
                         <small>${s.team} | ${s.position}</small><br>
                         <small style="color:#007bff;">Reason: ${s.reason}</small>`;
            suggDiv.appendChild(d);
          });
        }

      }catch(err){
        console.error('Error:',err);
      }
    }
  </script>
</body>
</html>
