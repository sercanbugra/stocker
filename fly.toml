# fly.toml app configuration file generated for stocker-4ii2vw on 2026-02-11T13:54:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stocker-2xbjqq'
primary_region = 'ams'

[build]

[env]
  PERSISTENT_DATA_DIR = "/data"
  SMTP_HOST           = "mail.privateemail.com"
  SMTP_PORT           = "587"
  SMTP_USER           = "info@gultechs.net"
  SITE_BASE_URL       = "https://stocker-2xbjqq.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']


[[mounts]]
  source = "stocker_data"
  destination = "/data"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
